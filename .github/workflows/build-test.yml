name: Build and Test Action

on: [push]

jobs:
  build:
    name: Build Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Npm setup
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.1
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build action
        run: npm run build

      - name: Upload action artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: action-dist
          path: dist

  test:
    name: Test Action
    runs-on: ubuntu-latest
    needs: build

    strategy:
      max-parallel: 1
      matrix:
        include:
          - ref: ${{ github.ref }}
            fail_on_warning: false
          - ref: "__default__"
            fail_on_warning: false
          - ref: |
              - ${{ github.ref }}
              - ${{ github.ref }}
            fail_on_warning: false
          - ref: "[${{ github.ref }}, ${{ github.ref }}]"
            fail_on_warning: false
          - ref: "__default__"
            fail_on_warning: true

    permissions:
      actions: write

    steps:
      - name: Create test file
        run: |
          mkdir -p test-cache
          echo "Creating cache for ${{ github.ref }} on ${{ github.sha }} for job ${{ strategy.job-index }}" > test-cache/test.txt

      - name: Create cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: test-cache
          key: test-cache-${{ github.run_id }}-${{ strategy.job-index }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: action.yml

      - name: Download action artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-dist
          path: dist

      - name: Run test case (with ref)
        if: matrix.ref != '__default__'
        uses: ./
        continue-on-error: ${{ matrix.fail_on_warning }}
        with:
          github-token: ${{ github.token }}
          ref: ${{ matrix.ref }}
          fail-on-warning: ${{ matrix.fail_on_warning }}

      - name: Run test case (without ref)
        if: matrix.ref == '__default__'
        uses: ./
        continue-on-error: ${{ matrix.fail_on_warning }}
        with:
          github-token: ${{ github.token }}
          fail-on-warning: ${{ matrix.fail_on_warning }}

      - name: Try to restore cache
        id: restore-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: test-cache
          key: test-cache-${{ github.run_id }}-${{ strategy.job-index }}

      - name: Verify cache deletion
        run: |
          if [ ${{ steps.restore-cache.outputs.cache-hit }} ]; then
              echo "Cache was not deleted properly."
              exit 1
          else
              echo "Cache deletion verified."
          fi

  commit-build:
    name: Commit Action Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download action artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-dist
          path: dist

      - name: Check for repo changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all dist)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dist directory
        if: steps.changes.outputs.changes == 'true'
        uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          commit_message: "📦 Update action build [skip ci]"
          files: dist/
          fail_on_self_push: false
